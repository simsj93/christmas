<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Koi No Yokan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="game">
        <div id="intro-overlay">
            <div id="intro-text">Click The Box</div>
        </div>
        <div id="boost" class="boost hidden" aria-label="Boost"></div>

        <div id="collection"></div>
        <div id="reward-overlay">
            <div id="reward-content"></div>
        </div>
        <div id="end-screen">
            <div>
                <div class="end-content">Happy Birthday, Emma. I can't adequately tell you what you mean to me, even in
                    a sequence of notes
                    within an idle clicker game. There's so much more to say, and I can't wait to spend our lives saying
                    it. I love you.</div>
            </div>
        </div>

        <div class="click-counter" id="click-counter">Total Score: 0</div>
        <div id="upgrade-panel"></div>
    </div>
    <script src="script.js"></script>

</body>

</html>
